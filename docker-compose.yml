services:

  postgres:
    image: postgres:16
    container_name: geofence_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geofence_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: geofence_backend

    ports:
      - "8080:8080"

    depends_on:
      - postgres

volumes:
  postgres_data: